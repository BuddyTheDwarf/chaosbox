name: preview
# Posts a live preview link on each PR, rendered straight from the contributor's fork via
# raw.githack.com — no deploy, no host, no secret.
#
# FORK-SAFETY: this uses pull_request_target (so it has a write token to comment), but it NEVER
# checks out or runs any PR code. It only reads PR metadata via the API and posts one comment.
# No code execution => no way for a PR to exfiltrate anything. Do not add a checkout of the head.
on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  issues: write

concurrency:
  group: preview-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  comment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const head = pr.head.repo && pr.head.repo.full_name;   // e.g. someone/chaosbox
            const ref = pr.head.ref;
            const { owner, repo } = context.repo;
            const marker = '<!-- chaosbox-preview -->';
            const threshold = Number('${{ vars.VOTE_THRESHOLD }}' || 3);

            const files = await github.paginate(github.rest.pulls.listFiles, { owner, repo, pull_number: pr.number });
            const pages = files
              .filter(f => f.status !== 'removed')
              .map(f => f.filename)
              .filter(f => /^contributions\/[^/]+\/.*\.html?$/.test(f));

            let body;
            if (!head) {
              body = `${marker}\n⚠️ Couldn't resolve the source fork, so no preview link.`;
            } else if (!pages.length) {
              body = `${marker}\n⚠️ No \`contributions/<name>/*.html\` file in this PR — nothing to preview. Add one and push.`;
            } else {
              const links = pages.map(p => `- [\`${p}\`](https://raw.githack.com/${head}/${ref}/${p})`).join('\n');
              body = `${marker}\n🔎 **Live preview** (rendered from your fork):\n${links}\n\nLooks good? **React 👍 to vote** — on this comment or on the PR description box at the top (both count). Once it reaches **${threshold}** net 👍 + green CI + 1h, the bot merges it automatically. A live vote tally will appear below shortly.`;
            }

            const comments = await github.paginate(github.rest.issues.listComments, { owner, repo, issue_number: pr.number });
            const mine = comments.find(c => c.body && c.body.includes(marker));
            if (mine) await github.rest.issues.updateComment({ owner, repo, comment_id: mine.id, body });
            else await github.rest.issues.createComment({ owner, repo, issue_number: pr.number, body });
