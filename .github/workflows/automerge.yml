name: automerge
# The vote-tally bot. Runs on a schedule from the BASE repo (never executes PR code) -> inherently
# fork-safe. Uses the built-in GITHUB_TOKEN (no PAT). Fails CLOSED: does nothing unless the repo
# variable BOT_ENABLED == "true" (that's the kill switch).
#
# NOTE: a merge done with GITHUB_TOKEN does NOT trigger pages.yml (GitHub's recursion guard), so the
# `deploy` job below republishes the site whenever this run actually merged something.
on:
  schedule:
    - cron: '*/10 * * * *'   # every 10 min
  workflow_dispatch: {}       # manual run button

permissions:
  contents: write
  pull-requests: write
  checks: read

concurrency:
  group: automerge
  cancel-in-progress: false

jobs:
  tally:
    runs-on: ubuntu-latest
    outputs:
      merged: ${{ steps.bot.outputs.merged }}
    steps:
      - uses: actions/checkout@v4   # for bot/banlist.txt
      - id: bot
        uses: actions/github-script@v7
        with:
          script: |
            // --- kill switch (fail closed) ---
            if ('${{ vars.BOT_ENABLED }}' !== 'true') {
              core.info('BOT_ENABLED != "true" — kill switch on, doing nothing.');
              core.setOutput('merged', 'false');
              return;
            }
            const THRESHOLD = Number('${{ vars.VOTE_THRESHOLD }}' || 3);   // net 👍-👎 needed
            const MIN_AGE_H = Number('${{ vars.MIN_PR_AGE_HOURS }}' || 1); // min PR age, hours

            // --- ban list ---
            const fs = require('fs');
            let banned = new Set();
            try {
              banned = new Set(fs.readFileSync('bot/banlist.txt', 'utf8')
                .split('\n').map(s => s.trim().toLowerCase()).filter(s => s && !s.startsWith('#')));
            } catch {}

            const { owner, repo } = context.repo;
            const prs = await github.paginate(github.rest.pulls.list, { owner, repo, state: 'open' });
            let merged = 0;

            for (const pr of prs) {
              const tag = `PR #${pr.number} (@${pr.user.login})`;
              if (pr.draft) { core.info(`${tag}: draft, skip`); continue; }
              if (banned.has(pr.user.login.toLowerCase())) { core.info(`${tag}: author banned, skip`); continue; }

              // sandbox: every changed file must live under contributions/
              const files = await github.paginate(github.rest.pulls.listFiles, { owner, repo, pull_number: pr.number });
              if (files.some(f => !f.filename.startsWith('contributions/'))) {
                core.info(`${tag}: touches files outside sandbox, skip`); continue;
              }

              const ageH = (Date.now() - new Date(pr.created_at)) / 3.6e6;

              // CI green: the required 'guard' check must have passed on the head sha.
              const { data: c } = await github.rest.checks.listForRef({ owner, repo, ref: pr.head.sha });
              const runs = c.check_runs || [];
              const ciOk = runs.some(r => r.name === 'guard' &&
                r.status === 'completed' && ['success', 'neutral', 'skipped'].includes(r.conclusion));

              // tally distinct 👍 / 👎 users — counted on the PR itself AND on any bot comment, because
              // people naturally click the reaction under the preview/scoreboard comment (dedup by login).
              const comments = await github.paginate(github.rest.issues.listComments, { owner, repo, issue_number: pr.number });
              const up = new Set(), down = new Set();
              const tallyInto = rs => { for (const r of rs) { if (!r.user) continue;
                if (r.content === '+1') up.add(r.user.login); if (r.content === '-1') down.add(r.user.login); } };
              tallyInto(await github.paginate(github.rest.reactions.listForIssue, { owner, repo, issue_number: pr.number }));
              for (const cm of comments) if (cm.user && cm.user.type === 'Bot')
                tallyInto(await github.paginate(github.rest.reactions.listForIssueComment, { owner, repo, comment_id: cm.id }));
              const net = up.size - down.size;

              // live scoreboard so voters can SEE exactly how many votes are needed
              const MARK = '<!-- chaosbox-tally -->';
              const need = Math.max(0, THRESHOLD - net);
              const ready = ciOk && ageH >= MIN_AGE_H && net >= THRESHOLD;
              const board = `${MARK}\n### 🗳️ Vote status — **${net} / ${THRESHOLD}** net 👍\n` +
                `👍 ${up.size} · 👎 ${down.size} · CI ${ciOk ? '✅' : '⏳'} · age ${ageH.toFixed(1)}h / ${MIN_AGE_H}h\n\n` +
                (ready
                  ? '✅ **All set — the bot merges this on its next run (within ~10 min).**'
                  : `React 👍 on this PR (the description box at the top, or any bot comment here — both count) to vote it in — **${need}** more net 👍 needed` +
                    `${ciOk ? '' : ' · waiting on CI'}${ageH < MIN_AGE_H ? ` · ${(MIN_AGE_H - ageH).toFixed(1)}h until eligible` : ''}.`);
              const board0 = comments.find(cm => cm.user && cm.user.type === 'Bot' && (cm.body || '').includes(MARK));
              if (board0) await github.rest.issues.updateComment({ owner, repo, comment_id: board0.id, body: board });
              else await github.rest.issues.createComment({ owner, repo, issue_number: pr.number, body: board });

              // merge gate
              if (ageH < MIN_AGE_H) { core.info(`${tag}: too young (${ageH.toFixed(1)}h)`); continue; }
              if (!ciOk) { core.info(`${tag}: required check 'guard' not green`); continue; }
              if (net < THRESHOLD) { core.info(`${tag}: votes ${net} < ${THRESHOLD}`); continue; }

              // merge
              try {
                await github.rest.pulls.merge({ owner, repo, pull_number: pr.number, merge_method: 'squash' });
                merged++;
                core.info(`${tag}: MERGED (net votes ${net})`);
                await github.rest.issues.createComment({ owner, repo, issue_number: pr.number,
                  body: `🎉 Merged by chaosbox — net votes **${net}** ≥ ${THRESHOLD}. Live shortly.` });
              } catch (e) { core.warning(`${tag}: merge failed: ${e.message}`); }
            }
            core.setOutput('merged', merged > 0 ? 'true' : 'false');

  # Republish the site only if the tally job merged something (GITHUB_TOKEN pushes don't trigger pages.yml).
  deploy:
    needs: tally
    if: needs.tally.outputs.merged == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with: { ref: main, fetch-depth: 0 }   # latest main (POST-merge), not the triggering SHA; full history for build.mjs
      - run: node build.mjs
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with: { path: public }
      - id: deploy
        uses: actions/deploy-pages@v4
