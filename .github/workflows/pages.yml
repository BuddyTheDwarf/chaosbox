name: pages
# Production deploy. Builds the gallery and publishes to GitHub Pages on every push to main.
# Uses the built-in GITHUB_TOKEN — no secrets, no host account.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }   # full history so build.mjs can read who/when each page was added
      - run: node build.mjs
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with: { path: public }
      - id: deploy
        uses: actions/deploy-pages@v4
