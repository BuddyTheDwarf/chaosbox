<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>bouncing box</title>
<meta name="description" content="Will it ever hit the corner? The eternal bouncing-logo question.">
<style>html,body{margin:0;height:100%;background:#0b0c0a;overflow:hidden;font-family:system-ui}
#b{position:absolute;padding:8px 14px;border-radius:8px;font-weight:800;color:#0b0c0a;background:#bef264;will-change:transform}</style>
</head><body><div id="b">chaosbox</div><script>
const b=document.getElementById('b');let px=20,py=20,dx=1.5,dy=1.5,ci=0;
const cols=['#bef264','#7aa2ff','#f472b6','#f3c14b','#3fd17a'];
(function loop(){const w=innerWidth-b.offsetWidth,h=innerHeight-b.offsetHeight;
  px+=dx;py+=dy;let hit=false;
  if(px<=0||px>=w){dx=-dx;hit=true;}if(py<=0||py>=h){dy=-dy;hit=true;}
  if(hit){ci=(ci+1)%cols.length;b.style.background=cols[ci];}
  px=Math.max(0,Math.min(w,px));py=Math.max(0,Math.min(h,py));
  b.style.transform=`translate(${px}px,${py}px)`;requestAnimationFrame(loop);})();
</script></body></html>
